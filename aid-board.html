    <style>
        /* ڕێکخستنی سایدباری کۆمپیوتەر */
        .sidebar-heading img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s ease;
        }

        .sidebar-heading img:hover {
            transform: scale(1.05);
        }

        /* =========================================
           دیزاینی مینیۆی مۆبایل بە ڕووناکی سوڕاوە (جێگیرکراو)
           ========================================= */
        @media (max-width: 991px) {
            #page-content-wrapper {
                padding-top: 100px !important;
            }

            @keyframes spinLight {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }

            .modern-navbar {
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                padding: 2px;
                border-radius: 52px;
                position: fixed;
                top: 15px;
                left: 0;
                right: 0;
                margin-left: auto;
                margin-right: auto;
                z-index: 1050;
                overflow: hidden;
                transition: border-radius 0.3s ease;
            }

            .modern-navbar::before {
                content: "";
                position: absolute;
                width: 200%;
                height: 1500px;
                top: 50%;
                left: 50%;
                margin-left: -100%;
                margin-top: -750px;
                background: conic-gradient(
                    transparent 0%, 
                    transparent 40%, 
                    #ffffff 50%, 
                    transparent 60%, 
                    transparent 90%, 
                    #ffffff 100% 
                );
                animation: spinLight 3s linear infinite;
                z-index: -1;
            }

            .navbar-inner-bg {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
                border-radius: 50px;
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                justify-content: space-between;
                padding: 8px 15px;
                transition: border-radius 0.3s ease;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            }

            body.dark-mode .navbar-inner-bg {
                background: rgba(30, 41, 59, 0.95);
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            }

            .modern-navbar.menu-open { border-radius: 22px; }
            .modern-navbar.menu-open .navbar-inner-bg { border-radius: 20px; }

            #navbarNav {
                background: transparent;
                border-radius: 0;
                padding: 0;
                box-shadow: none;
                position: static;
                margin-top: 10px;
                width: 100%;
            }

            #navbarNav .navbar-nav { width: 100%; padding: 0 5px; }
            #navbarNav .nav-item { width: 100%; margin-bottom: 8px; }
            #navbarNav .nav-link {
                width: 100%; 
                text-align: center;
                padding: 12px 15px;
                background-color: #f8fafc; 
                border-radius: 12px; 
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.3s ease;
                border: 1px solid transparent;
            }

            #navbarNav .nav-link:hover { background-color: #f1f5f9; }
            #navbarNav .nav-link.active {
                background-color: rgba(3, 182, 247, 0.1);
                border-color: rgba(3, 182, 247, 0.2);
            }

            body.dark-mode #navbarNav .nav-link { background-color: #334155; }
            body.dark-mode #navbarNav .nav-link.active {
                background-color: rgba(56, 189, 248, 0.15);
                border-color: rgba(56, 189, 248, 0.3);
            }
        }

        /* دیزاینی تابەکان */
        .nav-tabs .nav-link {
            color: var(--text-muted);
            font-weight: bold;
        }

        .nav-tabs .nav-link.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        /* دیزاینی کارتەکان (بۆ ڕووناک) */
        .case-card {
            background: var(--card-bg, #ffffff);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .action-btn {
            font-size: 0.85rem;
            padding: 5px 10px;
            margin: 2px;
        }

        /* =========================================
           دیزاینە نوێیەکان بۆ کات و ڕێکەوت و ئاگاداری
           ========================================= */
        .time-tracking-box {
            background: rgba(0, 0, 0, 0.03);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        body.dark-mode .time-tracking-box {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* کارتی دواکەوتوو (٧ ڕۆژ زیاتر) */
        .case-delayed-border {
            border: 2px solid #ef4444 !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2) !important;
        }

        .case-delayed-badge {
            background-color: #ef4444;
            color: white;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 12px;
            display: inline-block;
            width: 100%;
            text-align: center;
            animation: pulseWarning 2s infinite;
        }

        @keyframes pulseWarning {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* =========================================
           چارەسەری دۆخی تاریک بۆ خانەکان و کارتەکان
           ========================================= */
        body.dark-mode .case-card {
            background-color: #1e293b !important;
            border-color: #334155 !important;
            color: #f1f5f9 !important;
        }

        body.dark-mode .case-card h6 {
            color: #f1f5f9 !important;
        }

        body.dark-mode .case-card .border,
        body.dark-mode .case-card .border-bottom {
            border-color: #334155 !important;
        }

        body.dark-mode input.form-control,
        body.dark-mode select.form-select,
        body.dark-mode textarea.form-control {
            background-color: #0f172a !important;
            border-color: #334155 !important;
            color: #f1f5f9 !important;
        }

        body.dark-mode input.form-control::placeholder,
        body.dark-mode textarea.form-control::placeholder {
            color: #64748b !important;
        }

        body.dark-mode input.form-control:focus,
        body.dark-mode select.form-select:focus,
        body.dark-mode textarea.form-control:focus {
            border-color: #38bdf8 !important;
            box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25) !important;
        }

        body.dark-mode .bg-light {
            background-color: #0f172a !important;
        }

        /* =========================================
           گۆڕینی ڕەنگی ڕووناکی مینیۆکە
           ========================================= */
        @media (max-width: 991px) {
            .modern-navbar::before {
                background: conic-gradient(

                    transparent 60%, 
                    transparent 90%,

                background: conic-gradient(
                    transparent 0%, 
                    transparent 40%, 
                    #ffffff 50%, 
                    transparent 60%, 
                    transparent 90%,

        /* =========================================
   دیزاینی هێڵەکانی کات (Days Tracker)
   ========================================= */
.tracker-line {
    width: 14px;

    background-color: #e2e8f0; /* ڕەنگی هێڵی بەتاڵ (ڕۆژە ڕۆیشتووەکان) */
    transition: all 0.3s ease;
}

.tracker-line.active { background-color: #10b981; } /* سەوز بۆ کاتی ئاسایی */
.tracker-line.warning { background-color: #f59e0b; } /* پرتەقاڵی بۆ کاتی کەم */

body.dark-mode .tracker-line { background-color: #334155; }
body.dark-mode .tracker-line.active { background-color: #10b981; }
body.dark-mode .tracker-line.warning { background-color: #f59e0b; }
    </style>

    <script>
        function showComingSoonAlert(e) {
            e.preventDefault(); 
            Swal.fire({
                icon: 'info',
                title: 'بەم زووانە...',
                text: 'بەشی پڕۆفایل لە نوێکردنەوەکانی داهاتوودا چالاک دەکرێت.',
                confirmButtonText: 'باشە',
                confirmButtonColor: '#38bdf8'
            });
        }

        function updateDarkIcons(iconClass) {
            document.querySelectorAll('.dark-mode-icon').forEach(icon => {
                icon.classList.remove('fa-moon', 'fa-sun');
                icon.classList.add(iconClass);
            });
        }

        document.querySelectorAll('.dark-mode-toggle').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                if (document.body.classList.contains('dark-mode')) {
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('theme', 'light');
                    updateDarkIcons('fa-moon');
                } else {
                    document.body.classList.add('dark-mode');
                    localStorage.setItem('theme', 'dark');
                    updateDarkIcons('fa-sun');
                }
            });
        });

        if (localStorage.getItem('theme') === 'dark' || document.body.classList.contains('dark-mode')) {
            updateDarkIcons('fa-sun');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('mobileMenuToggler');
            const navMenu = document.getElementById('navbarNav');
            const navbar = document.querySelector('.modern-navbar');

            if (toggleBtn && navMenu && navbar) {
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    navMenu.classList.toggle('show');
                    navbar.classList.toggle('menu-open');
                });

                document.addEventListener('click', (e) => {
                    if (navMenu.classList.contains('show') && !navMenu.contains(e.target) && !toggleBtn.contains(e.target)) {
                        navMenu.classList.remove('show');
                        navbar.classList.remove('menu-open');
                    }
                });
            }
        });
    </script>
