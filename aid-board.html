<!DOCTYPE html>
<html lang="ckb" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تەختەی بەڕێوەبردنی کەیسەکان</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        .sidebar-heading img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s ease;
        }

        .sidebar-heading img:hover {
            transform: scale(1.05);
        }

        .nav-tabs .nav-link {
            color: var(--text-muted);
            font-weight: bold;
        }

        .nav-tabs .nav-link.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .case-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
        }

        body.dark-mode .case-card {
            border-color: #334155;
        }

        .action-btn {
            font-size: 0.85rem;
            padding: 5px 10px;
            margin: 2px;
        }
    </style>
</head>

<body>

    <div class="sidebar-overlay" onclick="toggleMenu()"></div>

    <div id="wrapper">

        <div id="sidebar-wrapper">
            <div class="d-flex justify-content-between align-items-center mb-4 p-3">
                <div class="sidebar-heading w-100">
                    <img src="logo.jpg" alt="MROVDOSTAN">
                    <span class="brand-text">MROVDOSTAN</span>
                </div>
            </div>

            <div class="d-flex flex-column gap-2">
                <a href="index.html" class="mobile-nav-item">
                    <i class="fa-solid fa-house"></i> <span>سەرەکی</span>
                </a>

                <a href="aid-board.html" class="mobile-nav-item active">
                    <i class="fa-solid fa-hand-holding-heart"></i> <span>دابەشکردن</span>
                </a>

                <a href="settings.html" class="mobile-nav-item">
                    <i class="fa-solid fa-gear"></i> <span>سێتینگ</span>
                </a>

                <a href="#" onclick="logout()" class="mobile-nav-item text-danger mt-5">
                    <i class="fa-solid fa-right-from-bracket"></i> <span>دەرچوون</span>
                </a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100 p-4">

            <nav class="navbar navbar-expand-lg navbar-light bg-transparent mb-4 border-bottom pb-3">
                <div class="container-fluid px-0 d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <button class="btn btn-primary-custom d-lg-none me-3" id="menu-toggle" onclick="toggleMenu()">
                            <i class="fa-solid fa-bars"></i>
                        </button>
                        <h4 class="fw-bold m-0 text-primary"><i class="fa-solid fa-users me-2"></i> بەڕێوەبردنی کەیسەکان
                        </h4>
                    </div>

                    <div class="d-flex gap-2">
                        <a href="aid-archive.html" class="btn btn-warning text-dark fw-bold">
                            <i class="fa-solid fa-box-archive"></i> ئەرشیف
                        </a>
                    </div>
                </div>
            </nav>

            <ul class="nav nav-tabs mb-4" id="boardTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="fill-tab" data-bs-toggle="tab" data-bs-target="#fill"
                        type="button" role="tab"><i class="fa-solid fa-pen-to-square me-1"></i> پڕکردنەوە</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="distribute-tab" data-bs-toggle="tab" data-bs-target="#distribute"
                        type="button" role="tab"><i class="fa-solid fa-share-nodes me-1"></i> دابەشکردن</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="categories-tab" data-bs-toggle="tab" data-bs-target="#categories"
                        type="button" role="tab"><i class="fa-solid fa-layer-group me-1"></i> بەشەکان</button>
                </li>
            </ul>

            <div class="tab-content" id="boardTabsContent">

                <div class="tab-pane fade show active" id="fill" role="tabpanel">
                    <div class="modern-card p-4 mx-auto" style="max-width: 600px;">
                        <h5 class="mb-4 fw-bold text-center">تۆمارکردنی کەیسی نوێ</h5>
                        <form id="newCaseForm">
                            <div id="dynamicFormFields">
                                <div class="text-center text-muted"><i class="fa-solid fa-spinner fa-spin"></i>
                                    چاوەڕوانبە...</div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mt-4"><i
                                    class="fa-solid fa-paper-plane me-2"></i> ناردن بۆ دابەشکردن</button>
                        </form>
                    </div>
                </div>

                <div class="tab-pane fade" id="distribute" role="tabpanel">
                    <div class="row" id="distributionList">
                        <div class="text-center text-muted w-100 mt-5"><i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="categories" role="tabpanel">
                    <div class="row mb-4">
                        <div class="col-md-4 mx-auto">
                            <select id="categoryFilter" class="form-select" onchange="loadCategoryCases()">
                                <option value="">هەڵبژاردنی بەش...</option>
                            </select>
                        </div>
                    </div>
                    <div class="row" id="categoryCasesList">
                        <div class="text-center text-muted mt-4"><i class="fa-solid fa-arrow-up"></i> تکایە سەرەتا بەشێک
                            هەڵبژێرە</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dark-mode.js"></script>
    <script src="js/aid-board.js"></script>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar-wrapper');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
    </script>

</body>

</html>
