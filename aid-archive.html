<head>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        /* ڕێکخستنی سایدباری کۆمپیوتەر */
        .sidebar-heading img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s ease;
        }

        .sidebar-heading img:hover {
            transform: scale(1.05);
        }

        /* =========================================
           دیزاینی مینیۆی مۆبایل بە ڕووناکی سوڕاوە
           ========================================= */
        @media (max-width: 991px) {
            #page-content-wrapper {
                padding-top: 100px !important; 
            }

            @keyframes spinLight {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }

            .modern-navbar {
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                padding: 2px; 
                border-radius: 52px;
                position: fixed; 
                top: 15px; 
                left: 0;
                right: 0;
                margin-left: auto;
                margin-right: auto;
                z-index: 1050;
                overflow: hidden; 
                transition: border-radius 0.3s ease;
            }

            .modern-navbar::before {
                content: "";
                position: absolute;
                width: 200%;
                height: 1500px; 
                top: 50%;
                left: 50%;
                margin-left: -100%;
                margin-top: -750px;
                background: conic-gradient(
                    transparent 0%, 
                    transparent 40%, 
                    #ffffff 50%, 
                    transparent 60%, 
                    transparent 90%, 
                    #ffffff 100% 
                );
                animation: spinLight 3s linear infinite;
                z-index: -1;
            }

            .navbar-inner-bg {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
                border-radius: 50px;
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                justify-content: space-between;
                padding: 8px 15px;
                transition: border-radius 0.3s ease;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            }

            body.dark-mode .navbar-inner-bg {
                background: rgba(30, 41, 59, 0.95);
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            }

            .modern-navbar.menu-open { border-radius: 22px; }
            .modern-navbar.menu-open .navbar-inner-bg { border-radius: 20px; }

            #navbarNav {
                background: transparent;
                border-radius: 0;
                padding: 0;
                box-shadow: none;
                position: static;
                margin-top: 10px;
                width: 100%;
            }

            #navbarNav .navbar-nav { width: 100%; padding: 0 5px; }
            #navbarNav .nav-item { width: 100%; margin-bottom: 8px; }
            #navbarNav .nav-link {
                width: 100%; 
                text-align: center;
                padding: 12px 15px;
                background-color: #f8fafc; 
                border-radius: 12px; 
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.3s ease;
                border: 1px solid transparent;
            }

            #navbarNav .nav-link:hover { background-color: #f1f5f9; }
            #navbarNav .nav-link.active {
                background-color: rgba(3, 182, 247, 0.1);
                border-color: rgba(3, 182, 247, 0.2);
            }

            body.dark-mode #navbarNav .nav-link { background-color: #334155; }
            body.dark-mode #navbarNav .nav-link.active {
                background-color: rgba(56, 189, 248, 0.15);
                border-color: rgba(56, 189, 248, 0.3);
            }
        }

        /* ستایلی کارتەکانی ئەرشیف */
        .archive-card {
            background: var(--card-bg, #ffffff);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* ڕەنگی باجەکان */
        .badge-success { background: rgba(25, 135, 84, 0.1); color: #198754; border: 1px solid #198754; }
        .badge-danger { background: rgba(220, 53, 69, 0.1); color: #dc3545; border: 1px solid #dc3545; }
        .badge-secondary { background: rgba(108, 117, 125, 0.1); color: #6c757d; border: 1px solid #6c757d; }
        .badge-info { background: rgba(13, 202, 240, 0.1); color: #0dcaf0; border: 1px solid #0dcaf0; }

        body.dark-mode .badge-success { color: #4ade80; border-color: #4ade80; background: rgba(74, 222, 128, 0.15);}
        body.dark-mode .badge-danger { color: #f87171; border-color: #f87171; background: rgba(248, 113, 113, 0.15);}
        body.dark-mode .badge-info { color: #38bdf8; border-color: #38bdf8; background: rgba(56, 189, 248, 0.15);}
        body.dark-mode .badge-secondary { color: #cbd5e1; border-color: #cbd5e1; background: rgba(203, 213, 225, 0.15);}

        /* =========================================
           دیزاینی کات و ئاگادارییە نوێیەکان
           ========================================= */
        .time-tracking-box {
            background: rgba(0, 0, 0, 0.03);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .case-delayed-border {
            border: 2px solid #ef4444 !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.1) !important;
        }

        .case-delayed-badge {
            background-color: #ef4444;
            color: white;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 12px;
            display: inline-block;
            width: 100%;
            text-align: center;
        }

        /* =========================================
           پشتگیری تەواوەتی دۆخی تاریک (Dark Mode)
           ========================================= */
        body.dark-mode .archive-card {
            background-color: #1e293b !important;
            border-color: #334155 !important;
            color: #f1f5f9 !important;
        }

        body.dark-mode .archive-card h6 {
            color: #f1f5f9 !important;
        }

        body.dark-mode .archive-card .text-dark {
            color: #f1f5f9 !important;
        }

        body.dark-mode .archive-card .bg-light {
            background-color: #0f172a !important;
            border-color: #334155 !important;
        }

        body.dark-mode .archive-card .border-bottom,
        body.dark-mode .archive-card .border-top {
            border-color: #334155 !important;
        }

        body.dark-mode .time-tracking-box {
            background: rgba(255, 255, 255, 0.05) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
        }

        /* دۆخی تاریک بۆ بەشی فلتەرەکان */
        body.dark-mode .modern-card {
            background-color: #1e293b !important;
            border-color: #334155 !important;
        }

        body.dark-mode .form-control,
        body.dark-mode .form-select,
        body.dark-mode .input-group-text {
            background-color: #0f172a !important;
            border-color: #334155 !important;
            color: #f1f5f9 !important;
        }

        body.dark-mode .form-control::placeholder {
            color: #64748b !important;
        }

        body.dark-mode .form-control:focus,
        body.dark-mode .form-select:focus {
            border-color: #38bdf8 !important;
            box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25) !important;
        }

        /* =========================================
           گۆڕینی ڕەنگی ڕووناکی مینیۆکە
           ========================================= */
        @media (max-width: 991px) {
            .modern-navbar::before {
                background: conic-gradient(
                    transparent 0%, transparent 40%, #03b6f7 50%, 
                    transparent 60%, transparent 90%, #03b6f7 100% 
                ) !important;
            }
            body.dark-mode .modern-navbar::before {
                background: conic-gradient(
                    transparent 0%, transparent 40%, #ffffff 50%, 
                    transparent 60%, transparent 90%, #ffffff 100% 
                ) !important;
            }
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/aid-archive.js"></script>

    <script>
        function showComingSoonAlert(e) {
            e.preventDefault(); 
            Swal.fire({
                icon: 'info',
                title: 'بەم زووانە...',
                text: 'بەشی پڕۆفایل لە نوێکردنەوەکانی داهاتوودا چالاک دەکرێت.',
                confirmButtonText: 'باشە',
                confirmButtonColor: '#38bdf8'
            });
        }

        function updateDarkIcons(iconClass) {
            document.querySelectorAll('.dark-mode-icon').forEach(icon => {
                icon.classList.remove('fa-moon', 'fa-sun');
                icon.classList.add(iconClass);
            });
        }

        document.querySelectorAll('.dark-mode-toggle').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                if (document.body.classList.contains('dark-mode')) {
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('theme', 'light');
                    updateDarkIcons('fa-moon');
                } else {
                    document.body.classList.add('dark-mode');
                    localStorage.setItem('theme', 'dark');
                    updateDarkIcons('fa-sun');
                }
            });
        });

        if (localStorage.getItem('theme') === 'dark' || document.body.classList.contains('dark-mode')) {
            updateDarkIcons('fa-sun');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('mobileMenuToggler');
            const navMenu = document.getElementById('navbarNav');
            const navbar = document.querySelector('.modern-navbar'); 

            if (toggleBtn && navMenu && navbar) {
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    navMenu.classList.toggle('show');
                    navbar.classList.toggle('menu-open');
                });

                document.addEventListener('click', (e) => {
                    if (navMenu.classList.contains('show') && !navMenu.contains(e.target) && !toggleBtn.contains(e.target)) {
                        navMenu.classList.remove('show');
                        navbar.classList.remove('menu-open');
                    }
                });
            }
        });
    </script>
