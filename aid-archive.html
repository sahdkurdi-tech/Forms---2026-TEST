<!DOCTYPE html>
<html lang="ckb" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ئەرشیفی کەیسەکان</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        /* ڕێکخستنی سایدباری کۆمپیوتەر */
        .sidebar-heading img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s ease;
        }

        .sidebar-heading img:hover {
            transform: scale(1.05);
        }

        /* =========================================
           دیزاینی مینیۆی مۆبایل بە ڕووناکی سوڕاوە
           ========================================= */
        @media (max-width: 991px) {
            #page-content-wrapper {
                padding-top: 100px !important; /* بۆشایی زیاتر بۆ خوارەوەی مینیۆکە */
            }

            /* ئەنیمەیشنی سوڕانەوەی ڕووناکییەکە */
            @keyframes spinLight {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }

            /* باکسی دەرەوەی مینیۆکە (جێگیرکراوە) */
            .modern-navbar {
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                padding: 2px; 
                border-radius: 52px;
                position: fixed; /* ئەمە وا دەکات لەگەڵ سکڕۆڵ جێگیر بێت */
                top: 15px; /* کەمێک بۆشایی لە سەرەوە */
                left: 0;
                right: 0;
                margin-left: auto;
                margin-right: auto;
                z-index: 1050;
                overflow: hidden; 
                transition: border-radius 0.3s ease;
            }

            /* دوو ڕووناکییە سپییەکە */
            .modern-navbar::before {
                content: "";
                position: absolute;
                width: 200%;
                height: 1500px; 
                top: 50%;
                left: 50%;
                margin-left: -100%;
                margin-top: -750px;
                background: conic-gradient(
                    transparent 0%, 
                    transparent 40%, 
                    #ffffff 50%, 
                    transparent 60%, 
                    transparent 90%, 
                    #ffffff 100% 
                );
                animation: spinLight 3s linear infinite;
                z-index: -1;
            }

            /* بەشە سەرەکییەکەی ناوەوەی مینیۆکە */
            .navbar-inner-bg {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
                border-radius: 50px;
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                justify-content: space-between;
                padding: 8px 15px;
                transition: border-radius 0.3s ease;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            }

            body.dark-mode .navbar-inner-bg {
                background: rgba(30, 41, 59, 0.95);
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            }

            /* کاتێک مینیۆکە دەکرێتەوە شێوەی دەگۆڕێت */
            .modern-navbar.menu-open {
                border-radius: 22px;
            }
            
            .modern-navbar.menu-open .navbar-inner-bg {
                border-radius: 20px;
            }

            #navbarNav {
                background: transparent;
                border-radius: 0;
                padding: 0;
                box-shadow: none;
                position: static;
                margin-top: 10px;
                width: 100%;
            }

            /* ڕێکخستنی دوگمەکانی مینیۆی مۆبایل */
            #navbarNav .navbar-nav {
                width: 100%;
                padding: 0 5px;
            }

            #navbarNav .nav-item {
                width: 100%;
                margin-bottom: 8px; 
            }
            
            #navbarNav .nav-link {
                width: 100%; 
                text-align: center;
                padding: 12px 15px;
                background-color: #f8fafc; 
                border-radius: 12px; 
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.3s ease;
                border: 1px solid transparent;
            }

            #navbarNav .nav-link:hover {
                background-color: #f1f5f9;
            }

            #navbarNav .nav-link.active {
                background-color: rgba(3, 182, 247, 0.1);
                border-color: rgba(3, 182, 247, 0.2);
            }

            body.dark-mode #navbarNav .nav-link {
                background-color: #334155;
            }

            body.dark-mode #navbarNav .nav-link.active {
                background-color: rgba(56, 189, 248, 0.15);
                border-color: rgba(56, 189, 248, 0.3);
            }
        }

        /* ستایلی کارتەکانی ئەرشیف */
        .archive-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        body.dark-mode .archive-card {
            border-color: #334155;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* ڕەنگی باجەکان */
        .badge-success {
            background: rgba(25, 135, 84, 0.1);
            color: #198754;
            border: 1px solid #198754;
        }

        .badge-danger {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            border: 1px solid #dc3545;
        }

        .badge-secondary {
            background: rgba(108, 117, 125, 0.1);
            color: #6c757d;
            border: 1px solid #6c757d;
        }

        .badge-info {
            background: rgba(13, 202, 240, 0.1);
            color: #0dcaf0;
            border: 1px solid #0dcaf0;
        }

        body.dark-mode .badge-success {
            color: #4ade80;
            border-color: #4ade80;
        }

        body.dark-mode .badge-danger {
            color: #f87171;
            border-color: #f87171;
        }

        body.dark-mode .badge-info {
            color: #38bdf8;
            border-color: #38bdf8;
        }

        /* =========================================
           گۆڕینی ڕەنگی ڕووناکی مینیۆکە
           ========================================= */
        @media (max-width: 991px) {
            /* ڕەنگی شینی لۆگۆکە بۆ دۆخی ئاسایی (ڕووناک) */
            .modern-navbar::before {
                background: conic-gradient(
                    transparent 0%, 
                    transparent 40%, 
                    #03b6f7 50%, /* ڕەنگی لۆگۆ */
                    transparent 60%, 
                    transparent 90%, 
                    #03b6f7 100% /* ڕەنگی لۆگۆ */
                ) !important;
            }

            /* ڕەنگی سپی بۆ دۆخی تاریک (بۆ ئەوەی زەق بێت) */
            body.dark-mode .modern-navbar::before {
                background: conic-gradient(
                    transparent 0%, 
                    transparent 40%, 
                    #ffffff 50%, /* ڕەنگی سپی */
                    transparent 60%, 
                    transparent 90%, 
                    #ffffff 100% /* ڕەنگی سپی */
                ) !important;
            }
        }
    </style>
</head>

<body>

                    <li class="nav-item border-top pt-2 mt-1 w-100">

                    <li class="nav-item border-top pt-2 mt-1 w-100">

    </nav>


    <div id="wrapper">

            <div class="modern-card p-3 mb-4">

            <div class="row" id="archiveList">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dark-mode.js"></script>
    <script src="js/aid-archive.js"></script>

    <script>
        // فەنکشنی پیشاندانی نامەی (بەم زووانە) بۆ دوگمەی پڕۆفایل
        function showComingSoonAlert(e) {
            e.preventDefault(); 
            Swal.fire({
                icon: 'info',
                title: 'بەم زووانە...',
                text: 'بەشی پڕۆفایل لە نوێکردنەوەکانی داهاتوودا چالاک دەکرێت.',
                confirmButtonText: 'باشە',
                confirmButtonColor: '#38bdf8'
            });
        }

        // کۆدی تایبەت بە کارپێکردنی دوگمەی دۆخی تاریک
        function updateDarkIcons(iconClass) {
            document.querySelectorAll('.dark-mode-icon').forEach(icon => {
                icon.classList.remove('fa-moon', 'fa-sun');
                icon.classList.add(iconClass);
            });
        }

        document.querySelectorAll('.dark-mode-toggle').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                if (document.body.classList.contains('dark-mode')) {
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('theme', 'light');
                    updateDarkIcons('fa-moon');
                } else {
                    document.body.classList.add('dark-mode');
                    localStorage.setItem('theme', 'dark');
                    updateDarkIcons('fa-sun');
                }
            });
        });

        // گونجاندنی ئایکۆن لەکاتی کردنەوەی پەڕەکە
        if (localStorage.getItem('theme') === 'dark' || document.body.classList.contains('dark-mode')) {
            updateDarkIcons('fa-sun');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('mobileMenuToggler');
            const navMenu = document.getElementById('navbarNav');
            const navbar = document.querySelector('.modern-navbar'); 

            if (toggleBtn && navMenu && navbar) {
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    navMenu.classList.toggle('show');
                    // کاتێک مینیۆکە دەکرێتەوە ئەم کڵاسەی بۆ زیاد دەبێت بۆ گۆڕینی قەبارەی ڕووناکییەکە
                    navbar.classList.toggle('menu-open');
                });

                document.addEventListener('click', (e) => {
                    if (navMenu.classList.contains('show') && !navMenu.contains(e.target) && !toggleBtn.contains(e.target)) {
                        navMenu.classList.remove('show');
                        navbar.classList.remove('menu-open');
                    }
                });
            }
        });
    </script>

</body>

</html>
