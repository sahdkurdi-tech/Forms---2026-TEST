<!DOCTYPE html>
<html lang="ckb" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ئەرشیفی کەیسەکان</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        /* ڕێکخستنی سایدباری کۆمپیوتەر */
        .sidebar-heading img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s ease;
        }

        .sidebar-heading img:hover {
            transform: scale(1.05);
        }

        /* =========================================
           دیزاینی مینیۆی مۆبایل (Floating Menu) 
           ========================================= */
        @media (max-width: 991px) {
            #page-content-wrapper {
                padding-top: 100px !important;
            }

            .modern-navbar {
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
            }

            body.dark-mode .modern-navbar {
                background: rgba(30, 41, 59, 0.85);
            }

            #navbarNav {
                background: #ffffff;
                border-radius: 15px;
                padding: 15px;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                margin-top: 10px;
            }

            body.dark-mode #navbarNav {
                background: #1e293b;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            }
        }

        /* ستایلی کارتەکانی ئەرشیف */
        .archive-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        body.dark-mode .archive-card {
            border-color: #334155;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* ڕەنگی باجەکان */
        .badge-success {
            background: rgba(25, 135, 84, 0.1);
            color: #198754;
            border: 1px solid #198754;
        }

        .badge-danger {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            border: 1px solid #dc3545;
        }

        .badge-secondary {
            background: rgba(108, 117, 125, 0.1);
            color: #6c757d;
            border: 1px solid #6c757d;
        }

        .badge-info {
            background: rgba(13, 202, 240, 0.1);
            color: #0dcaf0;
            border: 1px solid #0dcaf0;
        }

        body.dark-mode .badge-success {
            color: #4ade80;
            border-color: #4ade80;
        }

        body.dark-mode .badge-danger {
            color: #f87171;
            border-color: #f87171;
        }

        body.dark-mode .badge-info {
            color: #38bdf8;
            border-color: #38bdf8;
        }
    </style>
</head>

<body>

    <nav class="navbar modern-navbar fixed-top mx-auto mt-3 shadow-sm d-lg-none"
        style="max-width: 92%; border-radius: 50px; z-index: 1050; border: 1px solid rgba(0,0,0,0.05);">
        <div class="container-fluid px-3">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo.jpg" alt="MROVDOSTAN" width="35" height="35" class="rounded-circle me-2"
                    style="object-fit: contain;">
                <span class="fw-bold text-primary fs-6">MROVDOSTAN</span>
            </a>

            <button class="navbar-toggler border-0 shadow-none p-0" type="button" id="mobileMenuToggler">
                <i class="fa-solid fa-bars-staggered fa-lg text-primary"></i>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav align-items-center gap-2">
                    <li class="nav-item w-100"><a class="nav-link fw-bold text-center" href="index.html"><i
                                class="fa-solid fa-house me-1"></i> سەرەکی</a></li>
                    <li class="nav-item w-100"><a class="nav-link fw-bold active text-primary text-center"
                            href="aid-board.html"><i class="fa-solid fa-hand-holding-heart me-1"></i>کەیسی نوێ</a></li>
                    <li class="nav-item w-100" id="navSettingsMobileLi"><a class="nav-link fw-bold text-center" href="settings.html"><i
                                class="fa-solid fa-gear me-1"></i> سێتینگ</a></li>
                    <li class="nav-item w-100 border-top pt-2 mt-1"><a class="nav-link fw-bold text-danger text-center"
                            href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket me-1"></i> دەرچوون</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <div id="wrapper">
        <div id="sidebar-wrapper" class="d-none d-lg-block">
            <div class="d-flex justify-content-between align-items-center mb-4 p-3">
                <div class="sidebar-heading w-100">
                    <img src="logo.jpg" alt="MROVDOSTAN">
                    <span class="brand-text">MROVDOSTAN</span>
                </div>
            </div>

            <div class="d-flex flex-column gap-2">
                <a href="index.html" class="mobile-nav-item">
                    <i class="fa-solid fa-house"></i> <span>سەرەکی</span>
                </a>
                <a href="aid-board.html" class="mobile-nav-item active">
                    <i class="fa-solid fa-hand-holding-heart"></i> <span>کەیسی نوێ</span>
                </a>
                <a href="settings.html" class="mobile-nav-item" id="navSettingsSidebar">
                    <i class="fa-solid fa-gear"></i> <span>سێتینگ</span>
                </a>
                <a href="#" onclick="logout()" class="mobile-nav-item text-danger mt-5">
                    <i class="fa-solid fa-right-from-bracket"></i> <span>دەرچوون</span>
                </a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100 p-4">

            <nav class="navbar navbar-expand-lg navbar-light bg-transparent mb-4 border-bottom pb-3 d-none d-lg-flex">
                <div class="container-fluid px-0 d-flex justify-content-between align-items-center">
                    <h4 class="fw-bold m-0 text-primary"><i class="fa-solid fa-box-archive me-2"></i> ئەرشیفی کەیسەکان
                    </h4>
                    <a href="aid-board.html" class="btn btn-outline-secondary">
                        <i class="fa-solid fa-arrow-right"></i> گەڕانەوە بۆ دابەشکردن
                    </a>
                </div>
            </nav>

            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3 d-lg-none">
                <h4 class="fw-bold m-0 text-primary fs-5"><i class="fa-solid fa-box-archive me-2"></i> ئەرشیف</h4>
                <a href="aid-board.html" class="btn btn-sm btn-outline-secondary">
                    <i class="fa-solid fa-arrow-right"></i> گەڕانەوە
                </a>
            </div>

            <div class="modern-card p-3 mb-4">
                <div class="row align-items-center">
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-muted small mb-1">فلتەرکردن بەپێی باری کەیس</label>
                        <select id="statusFilter" class="form-select" onchange="renderArchive()">
                            <option value="all">پیشاندانی هەمووی</option>
                            <option value="سەردانی کراوان">سەردانی کراوان</option>
                            <option value="سەردانی نەکراوان">سەردانی نەکراوان</option>
                            <option value="پێویستی بە سەردان نەبوو">پێویستی بە سەردان نەبوو</option>
                            <option value="پێشتر سەردانی کراوە">پێشتر سەردانی کراوە</option>
                        </select>
                    </div>
                    <div class="col-md-4 mt-3 mt-md-0">
                        <div class="text-md-center">
                            <span class="badge bg-primary fs-6" id="totalCount">کۆی گشتی: 0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row" id="archiveList">
                <div class="text-center text-muted mt-5 w-100"><i class="fa-solid fa-spinner fa-spin fa-2x"></i></div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dark-mode.js"></script>
    <script src="js/aid-archive.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('mobileMenuToggler');
            const navMenu = document.getElementById('navbarNav');

            if (toggleBtn && navMenu) {
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    navMenu.classList.toggle('show');
                });

                document.addEventListener('click', (e) => {
                    if (navMenu.classList.contains('show') && !navMenu.contains(e.target) && !toggleBtn.contains(e.target)) {
                        navMenu.classList.remove('show');
                    }
                });
            }
        });
    </script>

</body>

</html>
