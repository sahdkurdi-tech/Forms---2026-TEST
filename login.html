<!DOCTYPE html>
<html lang="ckb" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سیستەمی فۆڕمەکان - چوونەژوورەوە</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.jpg">
    <meta name="theme-color" content="#4facfe">

    <style>
        /* --- پێناسەکردنی فۆنتی NRT --- */
        @font-face {
            font-family: 'NRT';
            src: url('NRT-Reg.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --text-light: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'NRT', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #0575e6, #021b79);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* شێوە بازنەییەکانی پشتەوە */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
            animation: floatBlob 10s ease-in-out infinite alternate;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: rgba(79, 172, 254, 0.4);
            top: 10%;
            left: 10%;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: rgba(0, 242, 254, 0.3);
            bottom: -5%;
            right: 5%;
            animation-delay: -5s;
        }

        @keyframes floatBlob {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-30px) scale(1.1); }
        }

        /* --- بۆکسی چوونە ژوورەوە --- */
        .glass-card {
            position: relative;
            width: 100%;
            max-width: 420px;
            padding: 40px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            z-index: 10;
            text-align: center;
            animation: fadeInCard 1s ease-out;
            isolation: isolate;
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- هێڵە سپییە سوڕاوەکەی دەوروبەری --- */
        .spinning-border {
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 2px;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .spinning-border::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg,
                    transparent 0%,
                    transparent 35%,
                    rgba(255, 255, 255, 1) 50%,
                    transparent 50%,
                    transparent 85%,
                    rgba(255, 255, 255, 1) 100%);
            animation: spinBorder 4s linear infinite;
        }

        @keyframes spinBorder {
            100% { transform: rotate(360deg); }
        }

        /* --- لۆگۆ --- */
        .logo-container {
            margin-bottom: 20px;
            animation: floatLogo 4s ease-in-out infinite alternate;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            padding: 5px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        @keyframes floatLogo {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-10px); }
        }

        h2 {
            color: var(--text-light);
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-size: 1.6rem;
        }

        p.subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* --- ئینپوتەکان --- */
        .input-group-custom {
            position: relative;
            margin-bottom: 20px;
        }

        .custom-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 14px 45px 14px 45px;
            color: var(--text-light);
            font-size: 1rem;
            outline: none;
            direction: ltr;
            text-align: left;
            font-family: 'NRT', sans-serif;
            transition: all 0.3s ease;
        }

        .custom-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .custom-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--secondary-color);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            transition: 0.3s;
            font-size: 1.1rem;
        }

        .input-group-custom:focus-within .input-icon {
            color: var(--secondary-color);
        }

        .eye-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: 0.3s;
            z-index: 5;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 30px;
        }

        .eye-btn:hover {
            color: var(--text-light);
        }

        /* --- بەشی نوێ: ئیمەیڵەکەم بیربێتەوە --- */
        .remember-me-box {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 20px;
            direction: rtl;
        }

        .remember-me-box input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-left: 8px;
            cursor: pointer;
            accent-color: var(--secondary-color);
        }

        .remember-me-box label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            cursor: pointer;
            user-select: none;
        }

        /* --- دوگمە --- */
        .btn-login {
            width: 100%;
            padding: 14px;
            margin-top: 5px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: #fff;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'NRT', sans-serif;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        #errorMsg {
            margin-top: 20px;
            background: rgba(255, 75, 75, 0.15);
            color: #ff6b6b;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            display: none;
            border: 1px solid rgba(255, 75, 75, 0.3);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* گونجاندنی تایبەت بۆ شاشەی مۆبایلەکان */
        @media (max-width: 480px) {
            .glass-card {
                padding: 30px 20px;
                border-radius: 20px;
            }

            .spinning-border {
                border-radius: 20px;
            }

            .logo-img {
                width: 85px;
                height: 85px;
            }

            h2 {
                font-size: 1.4rem;
            }

            p.subtitle {
                font-size: 0.85rem;
                margin-bottom: 25px;
            }

            .custom-input {
                font-size: 0.95rem;
                padding: 12px 40px 12px 40px;
            }

            .btn-login {
                font-size: 1rem;
                padding: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-card">
        <div class="spinning-border"></div>

        <div class="logo-container">
            <img src="logo.jpg" class="logo-img" alt="Logo"
                onerror="this.src='https://cdn-icons-png.flaticon.com/512/2919/2919600.png'">
        </div>

        <h2>MROVDOSTAN</h2>
        <p class="subtitle">تکایە زانیارییەکانت بنووسە بۆ چوونەژوورەوە</p>

        <form id="loginForm">
            <div class="input-group-custom">
                <i class="fa-regular fa-envelope input-icon"></i>
                <input type="email" id="email" class="custom-input" placeholder="ئیمەیڵ (Email)" required>
            </div>

            <div class="input-group-custom">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" id="password" class="custom-input" placeholder="وشەی نهێنی (Password)" required>
                <button type="button" class="eye-btn" onclick="togglePassword()">
                    <i class="fa-regular fa-eye eye-icon-inner"></i>
                </button>
            </div>

            <div class="remember-me-box">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">ئیمەیڵەکەم بیربێتەوە</label>
            </div>

            <button type="submit" id="loginBtn" class="btn-login">
                چوونە ژوورەوە
            </button>
        </form>

        <div id="errorMsg"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script src="js/firebase-config.js"></script>

    <script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.querySelector('.eye-icon-inner');
            if (passInput.type === "password") {
                passInput.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passInput.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // کاتێک پەڕەکە دەکرێتەوە، پشکنین بکە بزانە پێشتر ئیمەیڵی سەیڤ کردووە
        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem("rememberedEmail");
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });

        // گۆڕینی فەنکشنی چوونەژوورەوە بۆ شێوازی Async / Await بۆ ڕێکوپێکی زیاتر
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const emailInput = document.getElementById('email').value;
            const email = emailInput.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const rememberMeChecked = document.getElementById('rememberMe').checked;
            
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMsg');

            errorDiv.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i> خەریکە...';

            try {
                // ١. دڵنیابوون لەوەی دۆخی لۆگین بە هەمیشەیی دەمێنێتەوە بۆ ئەوەی دوای نوێکردنەوەش (Vercel) کێشە دروست نەبێت
                await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

                // ٢. هەوڵدان بۆ چوونەژوورەوە
                const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                const cleanEmail = userCredential.user.email.toLowerCase();
                
                // ٣. هێنانی زانیاری کەسەکە لە داتابەیس بۆ ئەوەی بزانین ڕۆڵی هەیە
                const userDoc = await db.collection("users").doc(cleanEmail).get();

                if (userDoc.exists) {
                    
                    // ٤. ئەگەر چێکبۆکسەکەی هەڵبژاردبوو، ئیمەیڵەکەی پاشەکەوت بکە، ئەگەرنا بیسڕەوە
                    if (rememberMeChecked) {
                        localStorage.setItem("rememberedEmail", cleanEmail);
                    } else {
                        localStorage.removeItem("rememberedEmail");
                    }

                    btn.style.background = '#28a745';
                    btn.style.boxShadow = '0 4px 15px rgba(40, 167, 69, 0.4)';
                    btn.innerHTML = '<i class="fa-solid fa-check me-2"></i> سەرکەوتووبوو';
                    setTimeout(() => window.location.href = "index.html", 800);
                } else {
                    throw new Error(`چوونەژوورەوە ڕەتکرایەوە بۆ: ${cleanEmail}`);
                }
            } catch (error) {
                let msg = "هەڵەیەک ڕوویدا";
                if (error.code === 'auth/user-not-found') msg = "بەکارهێنەر نەدۆزرایەوە";
                else if (error.code === 'auth/wrong-password') msg = "وشەی نهێنی هەڵەیە";
                else msg = error.message;
                showError(msg);
                
                // دەرچوون لە ئەکاونت ئەگەر لە داتابەیس تۆمار نەکرابوو بەڵام لە ئۆتێنتیکەیشن هەبوو
                await firebase.auth().signOut();
            }

            function showError(msg) {
                errorDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${msg}`;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'چوونە ژوورەوە';
            }
        });
    </script>

</body>

</html>
