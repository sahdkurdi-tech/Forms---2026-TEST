<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی فۆڕمەکان</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
<link rel="apple-touch-icon" sizes="180x180" href="logo.jpg">
<meta name="theme-color" content="#00f3ff">
    
    <style>
        /* --- پێناسەکردنی فۆنتی NRT --- */
        @font-face {
            font-family: 'NRT';
            src: url('NRT-Reg.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --primary: #00f3ff;   /* شینی نیۆن */
            --secondary: #f8f4fa; /* مۆری نیۆن */
            --bg: #020204;        /* ڕەشی ئەسڵی */
        }

        body {
            /* بەکارهێنانی فۆنتی NRT */
            font-family: 'NRT', sans-serif;
            margin: 0;
            height: 100vh;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- 1. ئەستێرەکان (Starfield) --- */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) ease-in-out infinite;
            z-index: 0;
        }

        @keyframes twinkle {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            50% { opacity: var(--opacity); transform: translateY(-20px) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(0.5); }
        }

        /* --- 2. بۆکسی چوونە ژوورەوە --- */
        .login-box {
            position: relative;
            width: 400px;
            padding: 3px;
            border-radius: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            box-shadow: 0 0 80px rgba(0, 243, 255, 0.1);
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        /* تیشکی سوڕاوەی دەوری کارتەکە */
        .login-box::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent 20%, var(--primary), transparent 90%);
            animation: rotateBorder 4s linear infinite;
        }
        
        .login-box::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent 20%, var(--secondary), transparent 90%);
            animation: rotateBorder 4s linear infinite;
            animation-delay: -2s;
        }

        @keyframes rotateBorder {
            100% { transform: rotate(360deg); }
        }

        .form-content {
            position: relative;
            background: #0a0b10;
            border-radius: 18px;
            padding: 50px 30px;
            text-align: center;
            z-index: 2;
        }

        /* --- 3. لۆگۆی پێشکەوتوو (HUD) - قەبارە گەورە --- */
        .logo-container {
            position: relative;
            width: 180px;  /* گەورەکراو */
            height: 180px; /* گەورەکراو */
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-img {
            width: 130px;  /* گەورەکراو */
            height: 130px; /* گەورەکراو */
            object-fit: contain;
            z-index: 2;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        /* بازنەکانی دەوری لۆگۆ */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid transparent;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }
        .r1 { 
            width: 100%; height: 100%; 
            border-top-color: var(--primary); 
            border-bottom-color: var(--primary); 
            animation: spin 10s linear infinite; 
        }
        .r2 { 
            width: 80%; height: 80%; 
            border-left-color: var(--secondary); 
            border-right-color: var(--secondary); 
            animation: spinReverse 6s linear infinite; 
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spinReverse { 100% { transform: rotate(-360deg); } }

        h2 {
            color: white;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        p.subtitle { color: #8899a6; font-size: 0.9rem; margin-bottom: 40px; letter-spacing: 1px; }

        /* --- 4. ئینپوتەکان --- */
        .input-wrapper {
            position: relative;
            margin-bottom: 25px;
            border-bottom: 2px solid #333;
            transition: 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 10px 20px -10px rgba(0, 243, 255, 0.2);
        }

        .custom-input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 40px 12px 40px; 
            color: white;
            font-size: 1.1rem;
            outline: none;
            direction: ltr;
            text-align: left;
            /* بۆ دڵنیایی کە ئینپوتەکانیش فۆنتەکە وەردەگرن */
            font-family: 'NRT', sans-serif; 
        }

        .input-icon {
            position: absolute;
            left: 0;
            top: 15px;
            color: #555;
            transition: 0.3s;
        }
        
        .input-wrapper:focus-within .input-icon { color: var(--primary); transform: translateY(-3px); }

        .eye-btn {
            position: absolute;
            right: 0;
            top: 12px;
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            transition: 0.3s;
            z-index: 5;
        }
        .eye-btn:hover { color: var(--primary); }

        /* --- 5. دوگمە --- */
        .btn-tech {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--primary);
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            /* فۆنت بۆ دوگمەکەش */
            font-family: 'NRT', sans-serif;
        }

        .btn-tech:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 40px var(--primary);
        }

        #errorMsg {
            margin-top: 25px;
            background: rgba(255, 0, 85, 0.1);
            color: #ff0055;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
            border: 1px solid rgba(255, 0, 85, 0.3);
            text-align: center;
        }
    </style>
</head>
<body>

<div id="stars-container"></div>

<div class="login-box animate-up">
    <div class="form-content">
        
        <div class="logo-container">
            <div class="ring r1"></div>
            <div class="ring r2"></div>
            <img src="logo.jpg" class="logo-img" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2919/2919600.png'">
        </div>

        <h2>MROVDOSTAN</h2>
        <p class="subtitle">زانیارییەکانت بنوسە بۆ چوونەژوورەوەی سیستەمەکە.</p>
        
        <form id="loginForm">
            <div class="input-wrapper">
                <i class="fa-regular fa-envelope input-icon"></i>
                <input type="email" id="email" class="custom-input" placeholder="Email" required>
            </div>
            
            <div class="input-wrapper">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" id="password" class="custom-input" placeholder="Password" required>
                <button type="button" class="eye-btn" onclick="togglePassword()">
                    <i class="fa-regular fa-eye eye-icon-inner"></i>
                </button>
            </div>

            <button type="submit" id="loginBtn" class="btn-tech">
                چوونە ژوورەوە
            </button>
        </form>
        
        <div id="errorMsg"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>

<script>
    // --- دروستکردنی ئەستێرەکان ---
    function createStars() {
        const container = document.getElementById('stars-container');
        const starCount = 150; 

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            const size = Math.random() * 2 + 1;
            const duration = Math.random() * 3 + 2; 
            const opacity = Math.random() * 0.7 + 0.3;

            star.style.left = `${x}px`;
            star.style.top = `${y}px`;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.setProperty('--duration', `${duration}s`);
            star.style.setProperty('--opacity', opacity);
            star.style.animationDelay = `${Math.random() * 5}s`;

            container.appendChild(star);
        }
    }
    createStars();

    function togglePassword() {
        const passInput = document.getElementById('password');
        const icon = document.querySelector('.eye-icon-inner');
        if (passInput.type === "password") {
            passInput.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passInput.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const emailInput = document.getElementById('email').value;
        const email = emailInput.trim().toLowerCase();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('errorMsg');

        errorDiv.style.display = 'none';
        btn.disabled = true;
        btn.innerText = 'خەریکە...';

        firebase.auth().signInWithEmailAndPassword(email, password)
            .then(async (userCredential) => {
                try {
                    const cleanEmail = userCredential.user.email.toLowerCase();
                    const userDoc = await db.collection("users").doc(cleanEmail).get();

                    if (userDoc.exists) {
                        btn.style.background = '#00f3ff';
                        btn.style.color = '#000';
                        btn.style.boxShadow = '0 0 30px #00f3ff';
                        btn.innerText = 'سەرکەوتوبوو';
                        setTimeout(() => window.location.href = "index.html", 800);
                    } else {
                        throw new Error(`ACCESS DENIED: ${cleanEmail}`);
                    }
                } catch (err) {
                    showError(err.message);
                    await firebase.auth().signOut();
                }
            })
            .catch((error) => {
                let msg = "ERROR OCCURRED";
                if(error.code === 'auth/user-not-found') msg = "USER NOT FOUND";
                else if(error.code === 'auth/wrong-password') msg = "INVALID PASSWORD";
                else msg = error.message;
                showError(msg);
            });

        function showError(msg) {
            errorDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${msg}`;
            errorDiv.style.display = 'block';
            btn.disabled = false;
            btn.innerText = 'چوونە ژوورەوە';
        }
    });
</script>

</body>
</html>
