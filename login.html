<!DOCTYPE html>
<html lang="ckb" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی فۆڕمەکان - چوونەژوورەوە</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.jpg">
    <meta name="theme-color" content="#4facfe">

    <style>
        /* --- پێناسەکردنی فۆنتی NRT --- */
        @font-face {
            font-family: 'NRT';
            src: url('NRT-Reg.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --text-light: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'NRT', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* باکگراوندی جوڵاو */
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #0575e6, #021b79);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* شێوە بازنەییەکانی پشتەوە بۆ جوانی زیاتر */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
            animation: floatBlob 10s ease-in-out infinite alternate;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: rgba(79, 172, 254, 0.4);
            top: 10%;
            left: 15%;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: rgba(0, 242, 254, 0.3);
            bottom: -5%;
            right: 10%;
            animation-delay: -5s;
        }

        @keyframes floatBlob {
            0% {
                transform: translateY(0) scale(1);
            }

            100% {
                transform: translateY(-30px) scale(1.1);
            }
        }

        /* --- بۆکسی چوونە ژوورەوە (Glassmorphism) --- */
        .glass-card {
            position: relative;
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            z-index: 10;
            text-align: center;
            animation: fadeInCard 1s ease-out;
        }

        @keyframes fadeInCard {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- لۆگۆ --- */
        .logo-container {
            margin-bottom: 25px;
            animation: floatLogo 4s ease-in-out infinite alternate;
        }

        .logo-img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            padding: 5px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        @keyframes floatLogo {
            0% {
                transform: translateY(0px);
            }

            100% {
                transform: translateY(-10px);
            }
        }

        h2 {
            color: var(--text-light);
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

        p.subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        /* --- ئینپوتەکان --- */
        .input-group-custom {
            position: relative;
            margin-bottom: 25px;
        }

        .custom-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 14px 45px 14px 45px;
            color: var(--text-light);
            font-size: 1.05rem;
            outline: none;
            direction: ltr;
            text-align: left;
            font-family: 'NRT', sans-serif;
            transition: all 0.3s ease;
        }

        .custom-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .custom-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--secondary-color);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            transition: 0.3s;
            font-size: 1.1rem;
        }

        .input-group-custom:focus-within .input-icon {
            color: var(--secondary-color);
        }

        .eye-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: 0.3s;
            z-index: 5;
            padding: 0;
        }

        .eye-btn:hover {
            color: var(--text-light);
        }

        /* --- دوگمە --- */
        .btn-login {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: #fff;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'NRT', sans-serif;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        /* --- پەیامی هەڵە --- */
        #errorMsg {
            margin-top: 20px;
            background: rgba(255, 75, 75, 0.15);
            color: #ff6b6b;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            display: none;
            border: 1px solid rgba(255, 75, 75, 0.3);
            text-align: center;
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-card">
        <div class="logo-container">
            <img src="logo.jpg" class="logo-img" alt="Logo"
                onerror="this.src='https://cdn-icons-png.flaticon.com/512/2919/2919600.png'">
        </div>

        <h2>MROVDOSTAN</h2>
        <p class="subtitle">تکایە زانیارییەکانت بنووسە بۆ چوونەژوورەوە</p>

        <form id="loginForm">
            <div class="input-group-custom">
                <i class="fa-regular fa-envelope input-icon"></i>
                <input type="email" id="email" class="custom-input" placeholder="ئیمەیڵ (Email)" required>
            </div>

            <div class="input-group-custom">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" id="password" class="custom-input" placeholder="وشەی نهێنی (Password)" required>
                <button type="button" class="eye-btn" onclick="togglePassword()">
                    <i class="fa-regular fa-eye eye-icon-inner"></i>
                </button>
            </div>

            <button type="submit" id="loginBtn" class="btn-login">
                چوونە ژوورەوە
            </button>
        </form>

        <div id="errorMsg"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script src="js/firebase-config.js"></script>

    <script>
        // نیشاندان و شاردنەوەی وشەی نهێنی
        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.querySelector('.eye-icon-inner');
            if (passInput.type === "password") {
                passInput.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passInput.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // لۆجیکی چوونەژوورەوە بێ گۆڕانکاری ماوەتەوە
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const emailInput = document.getElementById('email').value;
            const email = emailInput.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMsg');

            errorDiv.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i> خەریکە...';

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(async (userCredential) => {
                    try {
                        const cleanEmail = userCredential.user.email.toLowerCase();
                        const userDoc = await db.collection("users").doc(cleanEmail).get();

                        if (userDoc.exists) {
                            btn.style.background = '#28a745'; // گۆڕینی ڕەنگ بۆ سەوز لەکاتی سەرکەوتن
                            btn.innerHTML = '<i class="fa-solid fa-check me-2"></i> سەرکەوتووبوو';
                            setTimeout(() => window.location.href = "index.html", 800);
                        } else {
                            throw new Error(`چوونەژوورەوە ڕەتکرایەوە بۆ: ${cleanEmail}`);
                        }
                    } catch (err) {
                        showError(err.message);
                        await firebase.auth().signOut();
                    }
                })
                .catch((error) => {
                    let msg = "هەڵەیەک ڕوویدا";
                    if (error.code === 'auth/user-not-found') msg = "بەکارهێنەر نەدۆزرایەوە";
                    else if (error.code === 'auth/wrong-password') msg = "وشەی نهێنی هەڵەیە";
                    else msg = error.message;
                    showError(msg);
                });

            function showError(msg) {
                errorDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${msg}`;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'چوونە ژوورەوە';
            }
        });
    </script>

</body>

</html>
