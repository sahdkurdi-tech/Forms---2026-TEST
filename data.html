<!DOCTYPE html>
<html lang="ckb" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی فۆڕمەکان</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/print-style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        /* Custom Table Styles */
        .table thead th {
            background-color: #f8f9fa;
            color: #64748b;
            font-weight: 700;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
            vertical-align: middle;
        }

        .column-search {
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            padding: 5px 10px;
            font-size: 0.85rem;
            transition: all 0.2s;
            min-width: 120px;
        }

        .column-search:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        .data-img {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .clickable-row {
            cursor: pointer;
            transition: background 0.1s;
        }

        .clickable-row:hover {
            background-color: #f8fafc;
        }

        /* --- ستایلی تایبەت بە لۆگۆ (وەک پەڕەی سەرەکی) --- */
        .sidebar-heading img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s ease;
        }

        .sidebar-heading img:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="sidebar-overlay" onclick="toggleMenu()"></div>

    <div id="wrapper">

        <div id="sidebar-wrapper">
            <div class="d-flex justify-content-between align-items-center mb-4 p-3">
                <div class="sidebar-heading w-100">
                    <img src="logo.jpg" alt="MROVDOSTAN">
                    <span class="brand-text">MROVDOSTAN</span>
                </div>
            </div>

            <div class="d-flex flex-column gap-2">
                <a href="index.html" class="mobile-nav-item">
                    <i class="fa-solid fa-house"></i> <span>سەرەکی</span>
                </a>

                <a href="aid-board.html" class="mobile-nav-item" id="navAidBoard">
                    <i class="fa-solid fa-hand-holding-heart"></i> <span>کەیسی نوێ</span>
                </a>

                <a href="settings.html" id="navSettingsSidebar" class="mobile-nav-item d-none">
                    <i class="fa-solid fa-gear"></i> <span>سێتینگ</span>
                </a>

                <div class="mt-3 px-3 border-top pt-3">
                    <div class="text-uppercase fw-bold text-muted" style="font-size: 0.7rem; letter-spacing: 1px;">
                        پڕۆژەی ئێستا</div>
                    <div class="text-primary fw-bold mt-1" id="formTitleSidebar" style="font-size: 1.1rem;">...</div>
                </div>

                <a href="#" onclick="logout()" class="mobile-nav-item text-danger mt-5">
                    <i class="fa-solid fa-right-from-bracket"></i> <span>دەرچوون</span>
                </a>
            </div>
        </div>
        <div id="page-content-wrapper">

            <nav class="navbar navbar-expand-lg navbar-light bg-transparent mb-4">
                <div class="container-fluid px-0 d-flex justify-content-between flex-wrap gap-3">
                    <div class="d-flex align-items-center">
                        <button class="btn btn-primary-custom d-lg-none me-3" id="menu-toggle" onclick="toggleMenu()">
                            <i class="fa-solid fa-bars"></i>
                        </button>
                        <div>
                            <h4 class="fw-bold m-0 text-dark">داتای: <span id="formTitle"
                                    class="text-primary">...</span></h4>
                            <span class="text-muted small">ژمارەی دراوەکان: <span id="displayedCount"
                                    class="fw-bold text-primary">0</span></span>
                        </div>
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <input type="file" id="importExcelInput" hidden accept=".xlsx, .xls"
                            onchange="handleExcelImport(this)">

                        <button id="importExcelBtn" onclick="document.getElementById('importExcelInput').click()"
                            class="btn btn-warning text-dark shadow-sm animate-up d-none">
                            <i class="fa-solid fa-file-import me-2"></i> Import
                        </button>

                        <button id="excelExportBtn" onclick="exportToExcel()"
                            class="btn btn-success text-white shadow-sm animate-up d-none">
                            <i class="fa-solid fa-file-excel me-2"></i> Excel
                        </button>

                        <button id="bulkDeleteBtn" onclick="deleteSelected()"
                            class="btn btn-danger text-white shadow-sm d-none animate-up">
                            <i class="fa-solid fa-trash me-2"></i> سڕینەوە (<span id="selectedCount">0</span>)
                        </button>

                        <div class="dropdown">
                            <button
                                class="btn btn-white bg-white border shadow-sm dropdown-toggle d-flex align-items-center gap-2 px-3 py-2"
                                type="button" data-bs-toggle="dropdown" style="white-space: nowrap;">
                                <i class="fa-solid fa-table-columns text-primary"></i>
                                <span>ستوونەکان</span>
                            </button>
                            <div class="dropdown-menu shadow border-0 p-3" id="columnToggleMenu"
                                style="max-height: 300px; overflow-y: auto;"></div>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="modern-card p-0 overflow-hidden shadow-sm">
                <div class="table-responsive" style="min-height: 400px;">
                    <table class="table table-hover mb-0 align-middle" id="dataTable">
                        <thead>
                            <tr id="tableHead"></tr>
                        </thead>

                        <tbody id="tableBody">
                            <tr id="initialLoader">
                                <td colspan="10" class="text-center py-5 text-muted">
                                    <div class="spinner-border text-primary mb-3" role="status"></div>
                                    <h6 class="fw-bold">خەریکە داتاکان دەهێنرێن...</h6>
                                    <small>تکایە چاوەڕوان بە</small>
                                </td>
                            </tr>
                        </tbody>

                    </table>
                </div>

                <div class="text-center p-3 bg-light border-top">
                    <button id="loadMoreBtn" onclick="loadMoreData()" class="btn btn-outline-primary px-4 d-none">
                        <i class="fa-solid fa-circle-arrow-down me-2"></i> زیاتر ببینە (٥٠ی تر)
                    </button>
                    <div id="loadingMoreSpinner" class="spinner-border text-primary d-none" role="status"></div>
                    <p id="noMoreDataMsg" class="text-muted small m-0 d-none">گەیشتیتە کۆتایی لیستەکە</p>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">وردەکاری زانیاری</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="modalContent"></div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-outline-dark" onclick="printData('print')">
                        <i class="fa-solid fa-print me-2"></i> پرێنت
                    </button>
                    <button type="button" class="btn btn-outline-danger" onclick="printData('pdf')">
                        <i class="fa-regular fa-file-pdf me-2"></i> PDF
                    </button>

                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">داخستن</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title fw-bold">دەستکاری زانیاری</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="alert alert-warning small">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        تێبینی: لێرە دەتوانیت دەق و وێنەکانیش دەستکاری بکەیت.
                    </div>
                    <form id="editForm">
                        <input type="hidden" id="editDocId">
                        <div id="editFieldsContainer"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">داخستن</button>
                    <button type="button" class="btn btn-primary" onclick="saveEditedData()">پاشەکەوتکردن</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/print-manager.js"></script>
    <script src="js/dark-mode.js"></script>

    <script>
        // ٥. فەنکشنی کردنەوە و داخستنی مینیۆ (Active Class)
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar-wrapper');
            const overlay = document.querySelector('.sidebar-overlay');

            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // Check owner role
        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    // دڵنیابوونەوە لەوەی db بوونی هەیە
                    if (typeof db !== 'undefined') {
                        const doc = await db.collection("users").doc(user.email).get();
                        if (doc.exists && doc.data().role === 'owner') {
                            const settingLink = document.getElementById('navSettingsSidebar');
                            if (settingLink) settingLink.classList.remove('d-none');
                        }
                    }
                } catch (e) { console.error(e); }
            }
        });
    </script>

</body>

</html>
