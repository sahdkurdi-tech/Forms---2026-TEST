<!DOCTYPE html>
<html lang="ckb" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی فۆڕمەکان</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/jpeg" href="logo.jpg">

    <link rel="apple-touch-icon" sizes="180x180" href="logo.jpg">

    <link rel="icon" type="image/jpeg" sizes="192x192" href="logo.jpg">
    <link rel="icon" type="image/jpeg" sizes="512x512" href="logo.jpg">
    <meta name="theme-color" content="#03b6f7">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        /* ستایلی تایبەت بە ئامارەکان */
        .stat-card-simple {
            background: white;
            border-radius: 18px;
            padding: 20px;
            border: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01);
            transition: transform 0.2s;
        }

        body.dark-mode .stat-card-simple {
            background: var(--card-dark, #1e293b);
            border-color: var(--border-dark, #334155);
        }

        .stat-card-simple:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        /* ڕێکخستنی لۆگۆ */
        .sidebar-heading img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s ease;
        }

        .sidebar-heading img:hover {
            transform: scale(1.05);
        }

        /* =========================================
           دیزاینی مینیۆی مۆبایل (Floating Menu) 
           ========================================= */
        @media (max-width: 991px) {
            #page-content-wrapper {
                padding-top: 90px !important;
            }

            .modern-navbar {
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
            }

            body.dark-mode .modern-navbar {
                background: rgba(30, 41, 59, 0.85);
            }

            #navbarNav {
                background: #ffffff;
                border-radius: 15px;
                padding: 15px;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                margin-top: 10px;
            }

            body.dark-mode #navbarNav {
                background: #1e293b;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            }
        }
    </style>
</head>

<body>

    <nav class="navbar modern-navbar fixed-top mx-auto mt-3 shadow-sm d-lg-none"
        style="max-width: 92%; border-radius: 50px; z-index: 1050; border: 1px solid rgba(0,0,0,0.05);">
        <div class="container-fluid px-3">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo.jpg" alt="MROVDOSTAN" width="35" height="35" class="rounded-circle me-2"
                    style="object-fit: contain;">
                <span class="fw-bold text-primary fs-6">MROVDOSTAN</span>
            </a>

            <button class="navbar-toggler border-0 shadow-none p-0" type="button" id="mobileMenuToggler">
                <i class="fa-solid fa-bars-staggered fa-lg text-primary"></i>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="d-flex align-items-center gap-3 p-3 mb-2 border-bottom">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6366f1&color=fff" class="rounded-circle" width="45" height="45">
                    <div>
                        <span class="d-block fw-bold text-dark" id="userEmailDisplayMobile" style="font-size: 0.95rem;">...</span>
                        <small class="text-muted">بەڕێوەبەر</small>
                    </div>
                </div>

                <ul class="navbar-nav align-items-center gap-2 mt-2">
                    <li class="nav-item w-100"><a class="nav-link fw-bold active text-primary text-center"
                            href="index.html"><i class="fa-solid fa-house me-1"></i> سەرەکی</a></li>
                    <li class="nav-item w-100"><a class="nav-link fw-bold text-center" href="aid-board.html"><i
                                class="fa-solid fa-hand-holding-heart me-1"></i> کەیسی نوێ</a></li>
                    <li class="nav-item w-100 d-none" id="navSettingsMobile"><a class="nav-link fw-bold text-center"
                            href="settings.html"><i class="fa-solid fa-gear me-1"></i> سێتینگ</a></li>
                            
                    <li class="nav-item w-100 border-top pt-2 mt-1">
                        <a class="nav-link fw-bold text-secondary text-center dark-mode-toggle" href="#">
                            <i class="fa-solid fa-moon me-1 dark-mode-icon"></i> دۆخی تاریک
                        </a>
                    </li>

                    <li class="nav-item w-100 border-top pt-2 mt-1"><a class="nav-link fw-bold text-danger text-center"
                            href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket me-1"></i> دەرچوون</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <div id="wrapper">
        <div id="sidebar-wrapper" class="d-none d-lg-block">
            <div class="d-flex justify-content-between align-items-center mb-4 p-3">
                <div class="sidebar-heading w-100">
                    <img src="logo.jpg" alt="MROVDOSTAN">
                    <span class="brand-text">MROVDOSTAN</span>
                </div>
            </div>

            <div class="d-flex flex-column gap-2">
                <a href="index.html" class="mobile-nav-item active">
                    <i class="fa-solid fa-house"></i> <span>سەرەکی</span>
                </a>

                <a href="aid-board.html" class="mobile-nav-item" id="navAidBoard">
                    <i class="fa-solid fa-hand-holding-heart"></i> <span>کەیسی نوێ</span>
                </a>

                <a href="settings.html" id="navSettings" class="mobile-nav-item d-none">
                    <i class="fa-solid fa-gear"></i> <span>سێتینگ</span>
                </a>

                <a href="#" class="mobile-nav-item text-secondary mt-5 dark-mode-toggle">
                    <i class="fa-solid fa-moon dark-mode-icon"></i> <span>دۆخی تاریک</span>
                </a>

                <a href="#" onclick="logout()" class="mobile-nav-item text-danger mt-2">
                    <i class="fa-solid fa-right-from-bracket"></i> <span>دەرچوون</span>
                </a>
            </div>

            <div class="mt-auto p-3 border-top" style="border-color: rgba(0,0,0,0.05) !important;">
                <div class="d-flex align-items-center gap-3">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6366f1&color=fff" class="rounded-circle shadow-sm" width="40" height="40">
                    <div style="overflow: hidden;">
                        <span class="d-block fw-bold text-truncate text-dark" style="font-size: 0.85rem;" id="userEmailDisplayDesktop">...</span>
                        <small class="text-muted" style="font-size: 0.75rem;">پڕۆفایل</small>
                    </div>
                </div>
            </div>
        </div>


        <div id="page-content-wrapper" class="w-100 p-4 pt-lg-5"> <div class="row mb-5">
                <div class="col-md-4">
                    <div class="stat-card-simple">
                        <div class="icon-box bg-soft-primary ms-0">
                            <i class="fa-solid fa-layer-group"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-1 small">کۆی پڕۆژەکان</h6>
                            <h3 class="fw-bold m-0 text-dark" id="totalProjects">...</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 ps-2 pe-2 border-bottom pb-3">
                <h5 class="fw-bold text-dark m-0">لیستی پڕۆژەکان</h5>
            </div>

            <div id="formsContainer" class="row g-4">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dark-mode.js"></script>

    <script>
        // Global Variables
        let isOwner = false;
        let allProjects = [];

        // Auth & Check Role
        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                const emailPrefix = user.email.split('@')[0];
                
                // پڕکردنەوەی ناوی ئەکاونت لە هەردوو جێگاکە
                const desktopEmail = document.getElementById('userEmailDisplayDesktop');
                const mobileEmail = document.getElementById('userEmailDisplayMobile');
                if(desktopEmail) desktopEmail.innerText = emailPrefix;
                if(mobileEmail) mobileEmail.innerText = emailPrefix;

                try {
                    const doc = await db.collection("users").doc(user.email).get();
                    if (doc.exists && doc.data().role === 'owner') {
                        isOwner = true;

                        // پیشاندانی سێتینگ لە کۆمپیوتەر
                        const settingsLink = document.getElementById('navSettings');
                        if (settingsLink) settingsLink.classList.remove('d-none');

                        // پیشاندانی سێتینگ لە مۆبایل
                        const settingsLinkMobile = document.getElementById('navSettingsMobile');
                        if (settingsLinkMobile) settingsLinkMobile.classList.remove('d-none');

                        if (allProjects.length > 0) renderProjects(allProjects);
                    }
                } catch (e) { console.error(e); }
            }
        });

        // ===============================================
        // کۆدی تایبەت بە کارپێکردنی دوگمەی دۆخی تاریک
        // ===============================================
        function updateDarkIcons(iconClass) {
            document.querySelectorAll('.dark-mode-icon').forEach(icon => {
                icon.classList.remove('fa-moon', 'fa-sun');
                icon.classList.add(iconClass);
            });
        }

        document.querySelectorAll('.dark-mode-toggle').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                if (document.body.classList.contains('dark-mode')) {
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('theme', 'light');
                    updateDarkIcons('fa-moon');
                } else {
                    document.body.classList.add('dark-mode');
                    localStorage.setItem('theme', 'dark');
                    updateDarkIcons('fa-sun');
                }
            });
        });

        // گونجاندنی ئایکۆن لەکاتی کردنەوەی پەڕەکە
        if (localStorage.getItem('theme') === 'dark' || document.body.classList.contains('dark-mode')) {
            updateDarkIcons('fa-sun');
        }

        // ============================================================
        // Load Forms (Updated for Drag & Drop Order + Auto Fix)
        // ============================================================
        db.collection("forms").orderBy("order", "asc").onSnapshot(async (snapshot) => {
            const container = document.getElementById('formsContainer');

            if (snapshot.empty) {
                const checkSnapshot = await db.collection("forms").get();

                if (!checkSnapshot.empty) {
                    console.log("Detecting forms without 'order'. Fixing now...");
                    const batch = db.batch();
                    checkSnapshot.docs.forEach((doc, index) => {
                        if (doc.data().order === undefined) {
                            batch.update(doc.ref, { order: index });
                        }
                    });
                    await batch.commit();
                    return;
                }
            }

            const totalCount = snapshot.size;
            document.getElementById('totalProjects').innerText = totalCount;

            allProjects = [];
            snapshot.forEach(doc => {
                allProjects.push({ id: doc.id, data: doc.data() });
            });

            renderProjects(allProjects);
        });

        function renderProjects(projects) {
            const container = document.getElementById('formsContainer');
            container.innerHTML = "";

            if (projects.length === 0) {
                container.innerHTML = `
                <div class="col-12 text-center py-5">
                    <div class="bg-white p-5 rounded-4 border shadow-sm d-inline-block">
                        <i class="fa-solid fa-folder-open text-muted opacity-25 fa-4x mb-3"></i>
                        <h5 class="text-muted mt-3">هیچ پڕۆژەیەک نییە</h5>
                    </div>
                </div>`;
                return;
            }

            projects.forEach((item, index) => {
                const data = item.data;
                const id = item.id;
                const isActive = data.active !== false;
                const viewLink = `${window.location.origin}/view.html?id=${id}`;
                const delay = index * 0.05;

                let createdDate = 'نوێ';
                if (data.createdAt) {
                    if (typeof data.createdAt.toDate === 'function') {
                        createdDate = data.createdAt.toDate().toLocaleDateString('ku-IQ');
                    } else {
                        createdDate = new Date(data.createdAt).toLocaleDateString('ku-IQ');
                    }
                }

                const projectColor = data.color || '#38bdf8';

                let statusBadge = isActive
                    ? `<span class="elegant-status active"><i class="fa-solid fa-check"></i> چالاکە</span>`
                    : `<span class="elegant-status paused"><i class="fa-solid fa-pause"></i> ڕاگیراوە</span>`;

                let ownerActions = '';
                if (isOwner) {
                    ownerActions = `
                    <div class="elegant-actions-secondary mt-3 pt-3">
                        <a href="builder.html?id=${id}" class="elegant-btn-icon" title="دیزاینی فۆڕم">
                            <i class="fa-solid fa-wand-magic-sparkles"></i>
                        </a>
                        <button onclick="copyLink('${viewLink}')" class="elegant-btn-icon" title="کۆپی لینک">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                        <button onclick="toggleProjectStatus('${id}', ${isActive})" class="elegant-btn-icon" title="${isActive ? 'ڕاگرتن' : 'چالاککردن'}">
                            <i class="fa-solid ${isActive ? 'fa-pause' : 'fa-play'}"></i>
                        </button>
                        <button onclick="deleteForm('${id}')" class="elegant-btn-icon delete ms-auto" title="سڕینەوە">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>`;
                }

                container.innerHTML += `
            <div class="col-md-6 col-lg-4 mb-4 animate-up" style="animation-delay: ${delay}s">
                <div class="project-card-elegant" style="--card-color: ${projectColor}; border-top: 4px solid var(--card-color);">
                    
                    <div class="elegant-header">
                        <div class="elegant-icon" style="color: var(--card-color);">
                            <i class="fa-solid fa-folder-closed"></i>
                        </div>
                        ${statusBadge}
                    </div>
                    
                    <div class="elegant-body">
                        <h3 class="elegant-title text-truncate" title="${data.title || 'بێ ناو'}">${data.title || 'بێ ناو'}</h3>
                        <div class="elegant-date">
                            <i class="fa-regular fa-clock"></i> دروستکراوە لە: ${createdDate}
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <a href="${viewLink}" target="_blank" class="elegant-btn-main fill-btn" style="background-color: var(--card-color); border-color: var(--card-color);">
                            <i class="fa-solid fa-pen-nib"></i> پڕکردنەوە
                        </a>
                        <a href="data.html?id=${id}" class="elegant-btn-main data-btn">
                            <i class="fa-solid fa-database"></i> داتاکان
                        </a>
                    </div>

                    ${ownerActions}
                </div>
            </div>`;
            });
        }

        // ===============================================
        // ١. گۆڕینی دۆخی پڕۆژە
        // ===============================================
        async function toggleProjectStatus(id, currentStatus) {
            const actionText = currentStatus ? "ڕاگرتن" : "چالاککردن";
            const confirmColor = currentStatus ? "#f59e0b" : "#10b981";

            const result = await Swal.fire({
                title: `دڵنیایت لە ${actionText}ی فۆڕمەکە؟`,
                text: currentStatus ? "بەکارهێنەران چیتر ناتوانن فۆڕم پڕ بکەنەوە." : "فۆڕمەکە دووبارە کارا دەبێتەوە.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: confirmColor,
                cancelButtonColor: '#d33',
                confirmButtonText: `بەڵێ، ${actionText}`,
                cancelButtonText: 'پاشگەزبوونەوە'
            });

            if (result.isConfirmed) {
                try {
                    await db.collection("forms").doc(id).update({
                        active: !currentStatus
                    });

                    const Toast = Swal.mixin({
                        toast: true, position: 'top-end', showConfirmButton: false, timer: 3000,
                        timerProgressBar: true
                    });
                    Toast.fire({ icon: 'success', title: 'دۆخی فۆڕمەکە گۆڕدرا' });

                } catch (error) {
                    console.error(error);
                    Swal.fire('هەڵە!', 'کێشەیەک ڕوویدا.', 'error');
                }
            }
        }

        // ===============================================
        // ٢. سڕینەوەی پڕۆژە
        // ===============================================
        async function deleteForm(id) {
            const result = await Swal.fire({
                title: 'دڵنیایت لە سڕینەوە؟',
                text: "ئەم فۆڕمە و هەموو داتاکانی دەسڕدرێنەوە و چیتر ناگەڕێنەوە!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'بەڵێ، بیسڕەوە',
                cancelButtonText: 'پاشگەزبوونەوە'
            });

            if (result.isConfirmed) {
                Swal.fire({
                    title: 'خەریکە دەسڕدرێتەوە...',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                try {
                    await db.collection("forms").doc(id).delete();
                    Swal.fire('سڕایەوە!', 'پڕۆژەکە بە سەرکەوتوویی سڕایەوە.', 'success');
                } catch (error) {
                    console.error(error);
                    Swal.fire('هەڵە!', 'نەتوانرا بسڕدرێتەوە.', 'error');
                }
            }
        }

        function copyLink(link) {
            navigator.clipboard.writeText(link).then(() => {
                const Toast = Swal.mixin({
                    toast: true, position: 'top-end', showConfirmButton: false, timer: 2000,
                    timerProgressBar: true
                });
                Toast.fire({ icon: 'success', title: 'لینک کۆپی کرا' });
            });
        }

        // ===============================================
        // کارپێکردنی مینیۆی مۆبایل
        // ===============================================
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('mobileMenuToggler');
            const navMenu = document.getElementById('navbarNav');

            if (toggleBtn && navMenu) {
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    navMenu.classList.toggle('show');
                });

                document.addEventListener('click', (e) => {
                    if (navMenu.classList.contains('show') && !navMenu.contains(e.target) && !toggleBtn.contains(e.target)) {
                        navMenu.classList.remove('show');
                    }
                });
            }
        });
    </script>

</body>

</html>
